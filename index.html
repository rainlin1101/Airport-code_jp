<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>空港コード練習</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <h1>空港コード練習</h1>
        <p class="subtitle">都市名・空港名と IATA コードを答える学習アプリ</p>
        <p class="credit">FUZELIN</p>
      </header>

      <section class="panel controls">
        <label>
          分類
          <select id="categorySelect">
            <option value="international">国際</option>
            <option value="domestic">日本国内</option>
          </select>
        </label>
        <label class="toggle">
          <input id="shuffleMode" type="checkbox" checked />
          <span>問題を毎回ランダムに出題</span>
        </label>
        <button id="restartBtn" type="button">最初からやり直し</button>
      </section>

      <section class="panel question" id="questionPanel">
        <p class="meta"><span id="progressText">0 / 0</span></p>
        <p class="prompt" id="promptText">開始してください</p>
        <h2 id="questionText">—</h2>
      </section>

      <section class="panel answer">
        <form id="answerForm" autocomplete="off">
          <label for="answerInput" id="answerLabel">回答</label>
          <div class="input-row">
            <input id="answerInput" type="text" maxlength="20" placeholder="回答を入力" required />
            <button type="submit">回答</button>
          </div>
        </form>
        <p id="feedback" aria-live="polite"></p>
      </section>

      <section class="panel stats">
        <p>正解: <strong id="correctCount">0</strong></p>
        <p>不正解: <strong id="wrongCount">0</strong></p>
      </section>

      <section class="panel wrongbook">
        <h3>錯題本（ミス一覧）</h3>
        <p id="wrongbookEmpty">まだミスはありません。</p>
        <ul id="wrongbookList"></ul>
        <button id="retryWrongBtn" type="button" disabled>ミス問題だけ再挑戦</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
